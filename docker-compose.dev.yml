services:

  mysql-dev:
    image: mysql:8.4
    container_name: tapline-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: ghcr.io/dmoggles/tapline-backend:dev
    container_name: tapline-dev-backend
    restart: unless-stopped
    env_file: .env.dev
    depends_on:
      mysql-dev:
        condition: service_healthy
    volumes:
      - uploaded_media_dev:/app/uploaded_media
    expose:
      - "8000"

  frontend:
    image: ghcr.io/dmoggles/tapline-frontend:dev
    container_name: tapline-dev-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  mysql_data_dev:
  uploaded_media_dev:
