services:

  mysql:
    image: mysql:8.4
    container_name: tapline-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # $$MYSQL_ROOT_PASSWORD: Compose un-escapes $$ to $ so the shell inside
      # the container evaluates it from the container environment, not the YAML.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: ghcr.io/dmoggles/tapline-backend:${TAG:-latest}
    container_name: tapline-backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # club_logos.py resolves uploads to /app/uploaded_media inside the container
      - uploaded_media:/app/uploaded_media
    expose:
      - "8000"

  frontend:
    image: ghcr.io/dmoggles/tapline-frontend:${TAG:-latest}
    container_name: tapline-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  uploaded_media:
